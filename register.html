<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="title" content="Alquran" />
    <meta name="description" content="alquran for reading muslims holy quran" />
    <link rel="stylesheet" href="css/register.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <title>Alquran web</title>
  </head>
  <body>
    <section class="container">
      <img src="img/login-img.png" alt="" />

      <div class="info">
        <h1>register</h1>
        <h3 >
          Start your day by reading the holy verses of the <br />
          Al-quran.
        </h3>
        <form action="get">
            <div class="input-container">
                <input type="text" placeholder="full Name" required />
                <span class="icon">
                    <i class="fa-solid fa-user"></i>
                </span>
              </div>
          <div class="input-container">
            <input type="email" placeholder="E-mail" required />
            <span class="icon">
              <i class="fa fa-envelope"></i>
            </span>
          </div>

          <div class="input-container">
            <input type="password" placeholder="Password" />
            <span class="icon">
              <i class="fa fa-eye"></i>
            </span>
          </div>
          <div class="input-container">
            <input type="password" placeholder="Password again" />
            <span class="icon">
                <i class="fa fa-eye"></i>
            </span>
          </div>
          <div class="dpass-f">
            <a href="" class="pass-f">forget the password?</a>
          </div>
          <button class="btn1" type="submit">
            <h1>register</h1>
            <h1><i class="fa-solid fa-arrow-right"></i></h1>
          </button>
          <div class="icon-login">
            <img src="img/image 12.png" alt="" />
            <img src="img/image 13.png" alt="" />
          </div>
        </form>
        <p class="t-reg">Already have an account?<span> Log in</span></p>
    </div>
    </section>
    <script src="js/script.js"></script>
  </body>
</html>
