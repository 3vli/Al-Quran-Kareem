<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="title" content="Alquran" />
    <meta name="description" content="alquran for reading muslims holy quran" />
    <link rel="stylesheet" href="css/register.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const {
          data: { user },
        } = await supabase.auth.getUser();

        if (user) {
          // إذا كان المستخدم مسجل الدخول، انتقل مباشرة إلى الصفحة الرئيسية
          window.location.href = "main.html";
        }
      });
    </script>

    <title>Alquran web</title>
  </head>
  <body>
    <section class="container">
      <img src="img/login-img.png" alt="" />

      <div class="info">
        <h1>register</h1>
        <h3>
          Start your day by reading the holy verses of the <br />
          Al-quran.
        </h3>
        <form id="register-form">
          <!-- حقل الاسم -->
          <div class="input-container">
            <input id="reg-name" type="text" placeholder="Full Name" required />
            <span class="icon">
              <i class="fa fa-user"></i>
            </span>
          </div>

          <!-- حقل البريد الإلكتروني -->
          <div class="input-container">
            <input id="reg-email" type="email" placeholder="Email" required />
            <span class="icon">
              <i class="fa fa-envelope"></i>
            </span>
          </div>

          <!-- حقل كلمة المرور -->
          <div class="input-container">
            <input
              id="reg-password"
              type="password"
              placeholder="Password"
              required
            />
            <span class="icon">
              <i class="fa fa-eye"></i>
            </span>
          </div>

          <!-- حقل تأكيد كلمة المرور -->
          <div class="input-container">
            <input
              id="reg-confirm-password"
              type="password"
              placeholder="Confirm Password"
              required
            />
            <span class="icon">
              <i class="fa fa-eye"></i>
            </span>
          </div>

          <!-- زر التسجيل -->
          <button class="btn1" type="submit">
            <h1>Register</h1>
            <h1><i class="fa-solid fa-arrow-right"></i></h1>
          </button>
          <div class="icon-login">
            <img src="img/image 12.png" alt="" />
            <img src="img/image 13.png" alt="" />
          </div>
        </form>
        <p class="t-reg">
          Already have an account?<a href="index.html"> Log in</a>
        </p>
      </div>
    </section>
    <script type="module" src="js/supabase.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
