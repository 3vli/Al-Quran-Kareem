<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<meta name="title" content="Alquran" />
		<meta
			name="description"
			content="Alquran for reading Muslims' holy Quran"
		/>
		<link rel="stylesheet" href="/styles/login.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
		/>
		<title>Alquran Web</title>
	</head>
	<body>
		<section class="container">
			<img src="/imgs/login-img.png" alt="Login Image" />

			<div class="info">
				<h1>Log in</h1>
				<h3>
					Start your day by reading the holy verses of the <br />
					Al-Quran.
				</h3>
				<form id="login-form">
					<div class="input-container">
						<input
							id="email"
							type="email"
							name="email"
							placeholder="Email"
							required
						/>
						<span class="icon">
							<i class="fa fa-envelope"></i>
						</span>
					</div>

					<div class="input-container">
						<input
							id="password"
							type="password"
							name="password"
							placeholder="Password"
							required
						/>
						<button
							id="visibile-button"
							type="button"
							class="icon"
							onclick="togglePasswordVisibility()"
						>
							<i class="fa fa-eye"></i>
						</button>
					</div>

					<button class="btn1" type="submit">
						<h1>Log in</h1>
						<h1><i class="fa-solid fa-arrow-right"></i></h1>
					</button>

					<div class="icon-login">
						<img src="/imgs/image 12.png" alt="Icon 1" />
						<img src="/imgs/image 13.png" alt="Icon 2" />
					</div>
				</form>
				<p class="t-reg">
					Don't have an account yet?
					<a href="/pages/register.html">Register</a>
				</p>
			</div>
		</section>

		<script type="module" src="/scripts/auth.js"></script>
		<script type="module" src="/scripts/login.js"></script>
	</body>
</html>
