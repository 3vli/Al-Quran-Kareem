<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<meta name="title" content="Alquran" />
		<meta
			name="description"
			content="alquran for reading muslims holy quran"
		/>
		<link rel="stylesheet" href="/styles/register.css" />
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
		/>

		<title>Alquran web</title>
	</head>
	<body>
		<section class="container">
			<img src="/imgs/login-img.png" alt="" />

			<div class="info">
				<h1>register</h1>
				<h3>
					Start your day by reading the holy verses of the <br />
					Al-quran.
				</h3>
				<form id="register-form">
					<!-- Name field -->
					<div class="input-container">
						<input
							name="reg-name"
							type="text"
							placeholder="Full Name"
							required
						/>
							<span class="icon">
								<i class="fa-solid fa-user"></i>
							</span>
						</div>

					<!-- Email field -->
					<div class="input-container">
						<input
							name="reg-email"
							type="email"
							placeholder="Email"
							required
						/>
							<span class="icon">
								<i class="fa-solid fa-envelope"></i>
							</span>
					</div>

					<!-- Password field -->
					<div class="input-container">
						<input
							name="reg-password"
							type="password"
							placeholder="Password"
							required
						/>
							<span class="icon">
								<i class="fa fa-eye"></i>
							</span>
					</div>

					<!-- Confirm password field -->
					<div class="input-container">
						<input
							name="reg-confirm-password"
							type="password"
							placeholder="Confirm Password"
							required
						/>
							<span class="icon">
								<i class="fa fa-eye"></i>
							</span>
					</div>

					<!-- Submit button -->
					<button class="btn1" type="submit">
						<h1>Register</h1>
						<h1><i class="fa-solid fa-arrow-right"></i></h1>
					</button>
					<div class="icon-login">
						<img src="/imgs/image 12.png" alt="" />
						<img src="/imgs/image 13.png" alt="" />
					</div>
				</form>

				<p class="t-reg">
					Already have an account?<a href="/index.html">
						Log in</a
					>
				</p>
			</div>
		</section>
		<script type="module" src="/scripts/auth.js"></script>
		<script type="module" src="/scripts/register.js"></script>
	</body>
</html>
